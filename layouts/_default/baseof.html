<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title
      }}{{ end }}
    </title>
    <meta
      name="description"
      content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}"
    />
    <link rel="stylesheet" href="{{ `assets/styles.css` | relURL }}" />
  </head>
  <body>
    <div class="bg-graph" aria-hidden="true"><svg id="graph-bg"></svg></div>
    <main class="page">
      {{ partial "header.html" . }} {{ block "main" . }}{{ end }}
      <footer>KYMASOFT</footer>
    </main>
    <script src="{{ `assets/graph-bg.js` | relURL }}"></script>
  </body>
</html>
