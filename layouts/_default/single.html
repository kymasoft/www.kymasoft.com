{{ define "main" }}
<article class="sheet stack">
  <header class="sheet-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.lead }}
    <p class="lead">{{ . }}</p>
    {{ end }}
  </header>
  {{ .Content }} {{ with .Params.entries }}
  <ul class="micro">
    {{ range . }}
    <li><time datetime="{{ .date }}">{{ .date }}</time>{{ .text }}</li>
    {{ end }}
  </ul>
  {{ end }}
</article>
{{ end }}
